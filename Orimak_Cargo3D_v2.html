<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orimak Cargo 3D — Yükleme Planlayıcı</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-input: #0f1629;
    --border: #2a3550;
    --border-focus: #3b82f6;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --orange: #f97316;
    --purple: #8b5cf6;
    --cyan: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #fff;
  }
  .logo h1 {
    font-size: 18px; font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--text-secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { font-size: 11px; color: var(--text-muted); font-weight: 500; }

  .header-stats { display: flex; gap: 24px; align-items: center; }
  .stat-item { text-align: center; }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700; color: var(--accent);
  }
  .stat-value.warn { color: var(--warning); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.good { color: var(--success); }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .main-container { display: flex; flex: 1; overflow: hidden; }

  .panel-left {
    width: 340px; min-width: 340px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 12px; font-weight: 700;
  }

  .cargo-space-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cargo-space-btn {
    background: var(--bg-input); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px; cursor: pointer;
    transition: all 0.2s; text-align: left; color: var(--text-primary);
  }
  .cargo-space-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
  .cargo-space-btn.active { border-color: var(--accent); background: rgba(59,130,246,0.1); box-shadow: 0 0 12px var(--accent-glow); }
  .cargo-space-btn .cs-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .cargo-space-btn .cs-dim { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }

  .custom-dims { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
  .custom-dims.hidden { display: none; }
  .dim-input-group { display: flex; flex-direction: column; gap: 3px; }
  .dim-input-group label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .dim-input {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    width: 100%; outline: none; transition: border-color 0.2s;
  }
  .dim-input:focus { border-color: var(--accent); }

  .add-box-form { display: flex; flex-direction: column; gap: 8px; }
  .form-row-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-group { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .input-group label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
  .input-group input, .input-group select {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 6px; color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    outline: none; transition: border-color 0.2s; width: 100%; min-width: 0;
  }
  .input-group input:focus, .input-group select:focus { border-color: var(--accent); }

  .color-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
  }
  .color-swatch:hover, .color-swatch.active { border-color: #fff; transform: scale(1.15); }

  .btn {
    padding: 10px 16px; border: none; border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; display: flex;
    align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #2563eb);
    color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
  .btn-danger {
    background: rgba(239,68,68,0.15); color: var(--danger);
    border: 1px solid rgba(239,68,68,0.3);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .box-list-container { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .box-list-container::-webkit-scrollbar { width: 4px; }
  .box-list-container::-webkit-scrollbar-track { background: transparent; }
  .box-list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .box-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 6px; transition: all 0.2s; cursor: pointer;
  }
  .box-item:hover { border-color: var(--accent); }
  .box-item.selected { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .box-color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }
  .box-info { flex: 1; min-width: 0; }
  .box-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .box-dims { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .box-qty {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    background: rgba(59,130,246,0.15); color: var(--accent);
    padding: 2px 8px; border-radius: 4px;
  }
  .box-delete {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 16px; padding: 2px; transition: color 0.2s;
  }
  .box-delete:hover { color: var(--danger); }

  .viewport { flex: 1; position: relative; background: var(--bg-primary); }
  #canvas3d { width: 100%; height: 100%; display: block; }

  .viewport-controls {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
    background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(12px);
    padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border);
  }
  .view-btn {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 14px; color: var(--text-secondary);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .view-btn:hover { color: var(--text-primary); border-color: var(--accent); }
  .view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .load-btn-container {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 20px; text-align: center; color: var(--text-muted);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text { font-size: 13px; line-height: 1.6; }

  .tooltip-3d {
    position: absolute;
    background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; pointer-events: none; z-index: 1000;
    display: none; min-width: 160px;
  }
  .tooltip-3d .tt-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .tooltip-3d .tt-dims { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .tooltip-3d .tt-weight { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--warning); margin-top: 2px; }

  /* Edit mode hint bar */
  .edit-hint {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(59,130,246,0.15); backdrop-filter: blur(12px);
    border: 1px solid var(--accent); border-radius: 10px;
    padding: 8px 20px; font-size: 12px; font-weight: 600;
    color: var(--accent); display: none; z-index: 100;
    white-space: nowrap; pointer-events: none;
  }
  .edit-hint.visible { display: block; }

  /* Selected box glow */
  .utilization-bar { height: 6px; background: var(--bg-input); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .utilization-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.3s; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">O</div>
    <div>
      <h1>Orimak Cargo 3D</h1>
      <span>Yükleme Planlayıcı v1.1</span>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-value good" id="statVolume">0%</div>
      <div class="stat-label">Hacim Kullanımı</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statBoxCount">0</div>
      <div class="stat-label">Toplam Kutu</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statWeight">0 kg</div>
      <div class="stat-label">Toplam Ağırlık</div>
    </div>
  </div>
</header>

<div class="main-container">
  <div class="panel-left">
    <div class="panel-section">
      <div class="panel-section-title">⬡ Kargo Alanı</div>
      <div class="cargo-space-grid">
        <button class="cargo-space-btn active" data-space="20ft" onclick="selectCargoSpace('20ft')">
          <div class="cs-name">20ft Konteyner</div>
          <div class="cs-dim">5.9 × 2.35 × 2.39m</div>
        </button>
        <button class="cargo-space-btn" data-space="40ft" onclick="selectCargoSpace('40ft')">
          <div class="cs-name">40ft Konteyner</div>
          <div class="cs-dim">12.03 × 2.35 × 2.39m</div>
        </button>
        <button class="cargo-space-btn" data-space="truck" onclick="selectCargoSpace('truck')">
          <div class="cs-name">Kamyon/TIR</div>
          <div class="cs-dim">13.6 × 2.48 × 2.70m</div>
        </button>
        <button class="cargo-space-btn" data-space="custom" onclick="selectCargoSpace('custom')">
          <div class="cs-name">Özel Boyut</div>
          <div class="cs-dim">Kendin tanımla</div>
        </button>
      </div>
      <div class="custom-dims hidden" id="customDims">
        <div class="dim-input-group">
          <label>En (cm)</label>
          <input type="number" class="dim-input" id="customW" value="590" onchange="applyCustomDims()">
        </div>
        <div class="dim-input-group">
          <label>Boy (cm)</label>
          <input type="number" class="dim-input" id="customD" value="235" onchange="applyCustomDims()">
        </div>
        <div class="dim-input-group">
          <label>Yükseklik (cm)</label>
          <input type="number" class="dim-input" id="customH" value="239" onchange="applyCustomDims()">
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">＋ Kutu Ekle</div>
      <div class="add-box-form">
        <div class="input-group">
          <label>Açıklama</label>
          <input type="text" id="boxName" placeholder="Ürün adı..." value="Kutu A">
        </div>
        <div class="form-row-3col">
          <div class="input-group"><label>En (cm)</label><input type="number" id="boxW" value="60" min="1"></div>
          <div class="input-group"><label>Boy (cm)</label><input type="number" id="boxD" value="40" min="1"></div>
          <div class="input-group"><label>Yükseklik (cm)</label><input type="number" id="boxH" value="40" min="1"></div>
        </div>
        <div class="form-row-3col">
          <div class="input-group"><label>Ağırlık (kg)</label><input type="number" id="boxWeight" value="25" min="0.1" step="0.1"></div>
          <div class="input-group"><label>Adet</label><input type="number" id="boxQty" value="1" min="1"></div>
          <div></div>
        </div>
        <div class="input-group">
          <label>Renk</label>
          <div class="color-row" id="colorRow">
            <div class="color-swatch active" style="background:#3b82f6" data-color="#3b82f6"></div>
            <div class="color-swatch" style="background:#10b981" data-color="#10b981"></div>
            <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
            <div class="color-swatch" style="background:#ef4444" data-color="#ef4444"></div>
            <div class="color-swatch" style="background:#8b5cf6" data-color="#8b5cf6"></div>
            <div class="color-swatch" style="background:#06b6d4" data-color="#06b6d4"></div>
            <div class="color-swatch" style="background:#f97316" data-color="#f97316"></div>
            <div class="color-swatch" style="background:#ec4899" data-color="#ec4899"></div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="addBox()">＋ Kutu Ekle</button>
      </div>
    </div>

    <div class="box-list-container" id="boxList">
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-text">Henüz kutu eklenmedi.<br>Yukarıdan kutu ekleyerek başlayın.</div>
      </div>
    </div>

    <div class="load-btn-container">
      <button class="btn btn-primary" onclick="loadCargo()" style="font-size:15px; padding:14px;">▶ Yükle</button>
      <button class="btn btn-danger btn-sm" onclick="clearAll()">Tümünü Temizle</button>
    </div>
  </div>

  <div class="viewport">
    <canvas id="canvas3d"></canvas>
    <div class="tooltip-3d" id="tooltip3d">
      <div class="tt-name"></div>
      <div class="tt-dims"></div>
      <div class="tt-weight"></div>
    </div>
    <div class="edit-hint" id="editHint">
      Sürükle: Taşı (X/Z) &nbsp;│&nbsp; Shift+Sürükle: Yukarı/Aşağı &nbsp;│&nbsp; R: Döndür &nbsp;│&nbsp; Esc: Bırak
    </div>
    <div class="viewport-controls">
      <button class="view-btn active" onclick="setCameraView('perspective')">3D</button>
      <button class="view-btn" onclick="setCameraView('front')">Ön</button>
      <button class="view-btn" onclick="setCameraView('side')">Yan</button>
      <button class="view-btn" onclick="setCameraView('top')">Üst</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CARGO_SPACES = {
  '20ft':  { w: 590, d: 235, h: 239, label: "20ft Konteyner" },
  '40ft':  { w: 1203, d: 235, h: 239, label: "40ft Konteyner" },
  'truck': { w: 1360, d: 248, h: 270, label: "Kamyon/TIR" },
  'custom': { w: 590, d: 235, h: 239, label: "Özel" },
};

let currentSpace = '20ft';
let cargoW = 590, cargoD = 235, cargoH = 239;
let boxTypes = [];
let placedBoxes = [];
let selectedColor = '#3b82f6';
let boxIdCounter = 0;

// ═══════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas3d');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e17);
scene.fog = new THREE.Fog(0x0a0e17, 30, 80);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camera.position.set(12, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.1; dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -20; dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20; dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.25);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

const gridHelper = new THREE.GridHelper(40, 40, 0x1a2235, 0x111827);
scene.add(gridHelper);

let containerGroup = new THREE.Group();
scene.add(containerGroup);

// We keep box meshes and their edge lines together
let boxMeshes = [];     // Three.js Mesh objects (for raycasting & rendering)
let edgeLines = [];     // Corresponding edge LineSegments

// ═══════════════════════════════════════════
// CAMERA ORBIT CONTROLS (manual)
// ═══════════════════════════════════════════
let isOrbiting = false, isPanning = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: Math.PI / 4, phi: Math.PI / 4, radius: 16 };
let target = new THREE.Vector3(0, 2, 0);

// Drag state for box manipulation
let selectedMesh = null;       // currently selected box mesh
let isDraggingBox = false;     // are we dragging a box?
let dragPlane = new THREE.Plane();
let dragOffset = new THREE.Vector3();
let shiftHeld = false;

canvas.addEventListener('mousedown', onCanvasMouseDown);
canvas.addEventListener('contextmenu', (e) => e.preventDefault());
window.addEventListener('mouseup', onCanvasMouseUp);
window.addEventListener('mousemove', onCanvasMouseMove);
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  spherical.radius = Math.max(4, Math.min(50, spherical.radius + e.deltaY * 0.01));
  updateCameraFromSpherical();
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.key === 'Shift') shiftHeld = true;
  if ((e.key === 'r' || e.key === 'R') && selectedMesh) rotateSelectedBox();
  if (e.key === 'Escape') deselectBox();
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'Shift') shiftHeld = false;
});

function onCanvasMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  if (e.button === 0) { // left click
    // Try to pick a box
    raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
    const hits = raycaster.intersectObjects(boxMeshes);

    if (hits.length > 0) {
      const mesh = hits[0].object;
      selectBox(mesh);
      // Start dragging
      isDraggingBox = true;

      // Create drag plane
      if (shiftHeld) {
        // Vertical drag: plane faces camera but is vertical
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        camDir.y = 0; camDir.normalize();
        dragPlane.setFromNormalAndCoplanarPoint(camDir, mesh.position);
      } else {
        // Horizontal drag: Y-plane at box's current Y
        dragPlane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0, 1, 0), mesh.position);
      }

      const intersection = new THREE.Vector3();
      raycaster.ray.intersectPlane(dragPlane, intersection);
      dragOffset.subVectors(mesh.position, intersection);

      prevMouse = { x: e.clientX, y: e.clientY };
      return;
    }

    // No box hit → orbit
    isOrbiting = true;
    prevMouse = { x: e.clientX, y: e.clientY };
  }
  if (e.button === 2) { // right click → pan
    isPanning = true;
    prevMouse = { x: e.clientX, y: e.clientY };
  }
}

function onCanvasMouseUp(e) {
  if (isDraggingBox) {
    isDraggingBox = false;
    // Snap box into container bounds & update placedBoxes data
    if (selectedMesh) snapBoxToContainer(selectedMesh);
  }
  isOrbiting = false;
  isPanning = false;
}

function onCanvasMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  if (isDraggingBox && selectedMesh) {
    raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);

    if (shiftHeld) {
      // Vertical movement: rebuild plane facing camera
      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0; camDir.normalize();
      dragPlane.setFromNormalAndCoplanarPoint(camDir, selectedMesh.position);
    }

    const intersection = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
      if (shiftHeld) {
        // Only move Y
        selectedMesh.position.y = intersection.y + dragOffset.y;
      } else {
        // Move X and Z
        selectedMesh.position.x = intersection.x + dragOffset.x;
        selectedMesh.position.z = intersection.z + dragOffset.z;
      }
      // Move edge line too
      const idx = boxMeshes.indexOf(selectedMesh);
      if (idx >= 0 && edgeLines[idx]) {
        edgeLines[idx].position.copy(selectedMesh.position);
      }
    }
    tooltip.style.display = 'none';
    return;
  }

  if (isOrbiting) {
    const dx = (e.clientX - prevMouse.x) * 0.005;
    const dy = (e.clientY - prevMouse.y) * 0.005;
    spherical.theta -= dx;
    spherical.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, spherical.phi - dy));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCameraFromSpherical();
    return;
  }
  if (isPanning) {
    const dx = (e.clientX - prevMouse.x) * 0.01;
    const dy = (e.clientY - prevMouse.y) * 0.01;
    const right = new THREE.Vector3();
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), new THREE.Vector3(0,1,0)).normalize();
    target.addScaledVector(right, -dx);
    target.y += dy;
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCameraFromSpherical();
    return;
  }

  // Hover tooltip
  handleHover(e);
}

function updateCameraFromSpherical() {
  camera.position.set(
    target.x + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta),
    target.y + spherical.radius * Math.cos(spherical.phi),
    target.z + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta)
  );
  camera.lookAt(target);
}

// ═══════════════════════════════════════════
// BOX SELECTION & MANIPULATION
// ═══════════════════════════════════════════
const highlightColor = new THREE.Color(0xffffff);
let originalColor = null;
let selectionOutline = null; // a wireframe to show selection

function selectBox(mesh) {
  deselectBox(); // clear previous
  selectedMesh = mesh;

  // Store original emissive
  originalColor = mesh.material.emissive.clone();
  mesh.material.emissive.set(0x222244);

  // Show hint bar
  document.getElementById('editHint').classList.add('visible');
}

function deselectBox() {
  if (selectedMesh) {
    selectedMesh.material.emissive.copy(originalColor || new THREE.Color(0x000000));
    selectedMesh = null;
    originalColor = null;
  }
  document.getElementById('editHint').classList.remove('visible');
}

function snapBoxToContainer(mesh) {
  const ud = mesh.userData;
  const hw = ud.currentW * SCALE / 2;
  const hh = ud.currentH * SCALE / 2;
  const hd = ud.currentD * SCALE / 2;

  const maxX = cargoW * SCALE;
  const maxY = cargoH * SCALE;
  const maxZ = cargoD * SCALE;

  // Clamp to container
  mesh.position.x = Math.max(hw, Math.min(maxX - hw, mesh.position.x));
  mesh.position.y = Math.max(hh, Math.min(maxY - hh, mesh.position.y));
  mesh.position.z = Math.max(hd, Math.min(maxZ - hd, mesh.position.z));

  // Update edge line
  const idx = boxMeshes.indexOf(mesh);
  if (idx >= 0 && edgeLines[idx]) {
    edgeLines[idx].position.copy(mesh.position);
  }

  // Sync back to placedBoxes
  if (idx >= 0 && placedBoxes[idx]) {
    placedBoxes[idx].x = (mesh.position.x - hw) / SCALE;
    placedBoxes[idx].y = (mesh.position.y - hh) / SCALE;
    placedBoxes[idx].z = (mesh.position.z - hd) / SCALE;
  }
  updateStats();
}

function rotateSelectedBox() {
  if (!selectedMesh) return;
  const idx = boxMeshes.indexOf(selectedMesh);
  if (idx < 0) return;

  const pb = placedBoxes[idx];
  const ud = selectedMesh.userData;

  // Rotate: swap w and d
  const oldW = ud.currentW;
  const oldD = ud.currentD;
  ud.currentW = oldD;
  ud.currentD = oldW;
  pb.w = ud.currentW;
  pb.d = ud.currentD;

  // Rebuild geometry
  const newW = ud.currentW * SCALE;
  const newD = ud.currentD * SCALE;
  const newH = ud.currentH * SCALE;

  selectedMesh.geometry.dispose();
  selectedMesh.geometry = new THREE.BoxGeometry(newW, newH, newD);

  // Rebuild edge line
  if (edgeLines[idx]) {
    containerGroup.remove(edgeLines[idx]);
    edgeLines[idx].geometry.dispose();
  }
  const edgeGeo = new THREE.EdgesGeometry(selectedMesh.geometry);
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
  edgeLines[idx] = new THREE.LineSegments(edgeGeo, edgeMat);
  edgeLines[idx].position.copy(selectedMesh.position);
  containerGroup.add(edgeLines[idx]);

  // Re-snap
  snapBoxToContainer(selectedMesh);
}

// ═══════════════════════════════════════════
// RAYCASTER & TOOLTIP
// ═══════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const tooltip = document.getElementById('tooltip3d');

function handleHover(e) {
  if (isDraggingBox) return;
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
  const intersects = raycaster.intersectObjects(boxMeshes);
  if (intersects.length > 0) {
    const data = intersects[0].object.userData;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 16) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
    tooltip.querySelector('.tt-name').textContent = data.name;
    tooltip.querySelector('.tt-dims').textContent = `${data.currentW} × ${data.currentD} × ${data.currentH} cm`;
    tooltip.querySelector('.tt-weight').textContent = `${data.weight} kg`;
    canvas.style.cursor = 'grab';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
}

// ═══════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════
function onResize() {
  const vp = document.querySelector('.viewport');
  const w = vp.clientWidth, h = vp.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
setTimeout(onResize, 50);

// ═══════════════════════════════════════════
// CARGO SPACE
// ═══════════════════════════════════════════
function selectCargoSpace(type) {
  currentSpace = type;
  document.querySelectorAll('.cargo-space-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-space="${type}"]`).classList.add('active');
  const customEl = document.getElementById('customDims');
  if (type === 'custom') {
    customEl.classList.remove('hidden');
    applyCustomDims();
  } else {
    customEl.classList.add('hidden');
    const s = CARGO_SPACES[type];
    cargoW = s.w; cargoD = s.d; cargoH = s.h;
  }
  drawContainer();
  if (placedBoxes.length > 0) loadCargo();
}

function applyCustomDims() {
  cargoW = parseInt(document.getElementById('customW').value) || 590;
  cargoD = parseInt(document.getElementById('customD').value) || 235;
  cargoH = parseInt(document.getElementById('customH').value) || 239;
  CARGO_SPACES.custom.w = cargoW;
  CARGO_SPACES.custom.d = cargoD;
  CARGO_SPACES.custom.h = cargoH;
  drawContainer();
}

const SCALE = 0.01;

function drawContainer() {
  while (containerGroup.children.length) containerGroup.remove(containerGroup.children[0]);
  boxMeshes = [];
  edgeLines = [];
  deselectBox();

  const w = cargoW * SCALE, d = cargoD * SCALE, h = cargoH * SCALE;

  // Floor
  const floorGeo = new THREE.PlaneGeometry(w, d);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a2235, metalness: 0.2, roughness: 0.8 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(w / 2, 0.001, d / 2);
  floor.receiveShadow = true;
  containerGroup.add(floor);

  // Wireframe
  const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d));
  const lineMat = new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.4 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  wireframe.position.set(w / 2, h / 2, d / 2);
  containerGroup.add(wireframe);

  // Transparent walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.04, side: THREE.DoubleSide });
  const walls = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  walls.position.set(w / 2, h / 2, d / 2);
  containerGroup.add(walls);

  // Dimension lines
  const labelMat = new THREE.LineBasicMaterial({ color: 0x64748b });
  containerGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.005, -0.15), new THREE.Vector3(w, 0.005, -0.15)
  ]), labelMat));
  containerGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.15, 0.005, 0), new THREE.Vector3(-0.15, 0.005, d)
  ]), labelMat));

  target.set(w / 2, h / 3, d / 2);
  spherical.radius = Math.max(w, d, h) * 1.6;
  updateCameraFromSpherical();
  updateStats();
}

// ═══════════════════════════════════════════
// COLOR PICKER
// ═══════════════════════════════════════════
document.querySelectorAll('.color-swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(c => c.classList.remove('active'));
    s.classList.add('active');
    selectedColor = s.dataset.color;
  });
});

// ═══════════════════════════════════════════
// BOX MANAGEMENT
// ═══════════════════════════════════════════
function addBox() {
  const name = document.getElementById('boxName').value || 'Kutu';
  const w = parseInt(document.getElementById('boxW').value) || 60;
  const d = parseInt(document.getElementById('boxD').value) || 40;
  const h = parseInt(document.getElementById('boxH').value) || 40;
  const weight = parseFloat(document.getElementById('boxWeight').value) || 25;
  const qty = parseInt(document.getElementById('boxQty').value) || 1;
  boxTypes.push({ id: ++boxIdCounter, name, w, d, h, weight, qty, color: selectedColor });
  renderBoxList();
}

function removeBox(id) {
  boxTypes = boxTypes.filter(b => b.id !== id);
  renderBoxList();
}

function renderBoxList() {
  const container = document.getElementById('boxList');
  if (boxTypes.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-text">Henüz kutu eklenmedi.<br>Yukarıdan kutu ekleyerek başlayın.</div></div>`;
    return;
  }
  container.innerHTML = boxTypes.map(b => `
    <div class="box-item" data-id="${b.id}">
      <div class="box-color-dot" style="background:${b.color}"></div>
      <div class="box-info">
        <div class="box-name">${b.name}</div>
        <div class="box-dims">${b.w}×${b.d}×${b.h} cm · ${b.weight}kg</div>
      </div>
      <div class="box-qty">×${b.qty}</div>
      <button class="box-delete" onclick="removeBox(${b.id})">✕</button>
    </div>
  `).join('');
}

function clearAll() {
  boxTypes = []; placedBoxes = [];
  deselectBox();
  renderBoxList(); drawContainer();
}

// ═══════════════════════════════════════════
// BIN PACKING
// ═══════════════════════════════════════════
function loadCargo() {
  placedBoxes = [];
  boxMeshes.forEach(m => { m.geometry.dispose(); m.material.dispose(); containerGroup.remove(m); });
  edgeLines.forEach(l => { if(l) { l.geometry.dispose(); containerGroup.remove(l); } });
  boxMeshes = [];
  edgeLines = [];
  deselectBox();

  let allBoxes = [];
  boxTypes.forEach(bt => {
    for (let i = 0; i < bt.qty; i++) allBoxes.push({ ...bt, instanceId: allBoxes.length });
  });
  allBoxes.sort((a, b) => (b.w * b.d * b.h) - (a.w * a.d * a.h));

  const spaces = [{ x: 0, y: 0, z: 0, w: cargoW, d: cargoD, h: cargoH }];

  allBoxes.forEach(box => {
    const rotations = [
      { w: box.w, d: box.d, h: box.h },
      { w: box.w, d: box.h, h: box.d },
      { w: box.d, d: box.w, h: box.h },
      { w: box.d, d: box.h, h: box.w },
      { w: box.h, d: box.w, h: box.d },
      { w: box.h, d: box.d, h: box.w },
    ];
    let bestSpace = null, bestRot = null, bestIdx = -1;
    for (let si = 0; si < spaces.length; si++) {
      const sp = spaces[si];
      for (const rot of rotations) {
        if (rot.w <= sp.w && rot.d <= sp.d && rot.h <= sp.h) {
          if (!bestSpace || sp.y < bestSpace.y || (sp.y === bestSpace.y && sp.x < bestSpace.x)) {
            bestSpace = sp; bestRot = rot; bestIdx = si;
          }
        }
      }
    }
    if (bestSpace && bestRot) {
      placedBoxes.push({
        x: bestSpace.x, y: bestSpace.y, z: bestSpace.z,
        w: bestRot.w, d: bestRot.d, h: bestRot.h,
        name: box.name, color: box.color, weight: box.weight,
        origW: box.w, origD: box.d, origH: box.h,
      });
      spaces.splice(bestIdx, 1);
      if (bestSpace.w - bestRot.w > 0)
        spaces.push({ x: bestSpace.x + bestRot.w, y: bestSpace.y, z: bestSpace.z, w: bestSpace.w - bestRot.w, d: bestSpace.d, h: bestSpace.h });
      if (bestSpace.d - bestRot.d > 0)
        spaces.push({ x: bestSpace.x, y: bestSpace.y, z: bestSpace.z + bestRot.d, w: bestRot.w, d: bestSpace.d - bestRot.d, h: bestSpace.h });
      if (bestSpace.h - bestRot.h > 0)
        spaces.push({ x: bestSpace.x, y: bestSpace.y + bestRot.h, z: bestSpace.z, w: bestRot.w, d: bestRot.d, h: bestSpace.h - bestRot.h });
      spaces.sort((a, b) => a.y - b.y || a.x - b.x || a.z - b.z);
    }
  });

  // Draw boxes — FULLY OPAQUE
  placedBoxes.forEach((pb) => {
    const w = pb.w * SCALE, d = pb.d * SCALE, h = pb.h * SCALE;
    const x = pb.x * SCALE, y = pb.y * SCALE, z = pb.z * SCALE;

    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(pb.color),
      metalness: 0.05,
      roughness: 0.55,
      // NO transparent, NO opacity — fully opaque
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + w / 2, y + h / 2, z + d / 2);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = {
      name: pb.name,
      weight: pb.weight,
      origW: pb.origW, origD: pb.origD, origH: pb.origH,
      currentW: pb.w, currentD: pb.d, currentH: pb.h,
    };
    containerGroup.add(mesh);
    boxMeshes.push(mesh);

    // Edge lines
    const edgeGeo = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
    const edge = new THREE.LineSegments(edgeGeo, edgeMat);
    edge.position.copy(mesh.position);
    containerGroup.add(edge);
    edgeLines.push(edge);
  });

  // Drop-in animation (no opacity fade — just position)
  boxMeshes.forEach((m, i) => {
    const targetY = m.position.y;
    m.position.y = targetY + 2;
    const startTime = performance.now() + i * 50;
    function animIn(now) {
      const t = Math.min(1, (now - startTime) / 350);
      if (t < 0) { requestAnimationFrame(animIn); return; }
      const ease = 1 - Math.pow(1 - t, 3);
      m.position.y = targetY + 2 * (1 - ease);
      // sync edge
      const idx = boxMeshes.indexOf(m);
      if (idx >= 0 && edgeLines[idx]) edgeLines[idx].position.copy(m.position);
      if (t < 1) requestAnimationFrame(animIn);
    }
    requestAnimationFrame(animIn);
  });

  updateStats();
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function updateStats() {
  const containerVol = cargoW * cargoD * cargoH;
  const usedVol = placedBoxes.reduce((s, b) => s + b.w * b.d * b.h, 0);
  const pct = containerVol > 0 ? ((usedVol / containerVol) * 100).toFixed(1) : 0;
  const totalWeight = placedBoxes.reduce((s, b) => s + b.weight, 0);
  const volEl = document.getElementById('statVolume');
  volEl.textContent = pct + '%';
  volEl.className = 'stat-value ' + (pct > 85 ? 'danger' : pct > 60 ? 'warn' : 'good');
  document.getElementById('statBoxCount').textContent = placedBoxes.length;
  document.getElementById('statWeight').textContent = totalWeight.toFixed(1) + ' kg';
}

// ═══════════════════════════════════════════
// CAMERA VIEWS
// ═══════════════════════════════════════════
function setCameraView(view) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const w = cargoW * SCALE, d = cargoD * SCALE, h = cargoH * SCALE;
  target.set(w / 2, h / 2, d / 2);
  const dist = Math.max(w, d, h) * 1.8;
  switch(view) {
    case 'perspective': spherical = { theta: Math.PI/4, phi: Math.PI/4, radius: dist }; break;
    case 'front': spherical = { theta: 0, phi: Math.PI/2-0.01, radius: dist }; break;
    case 'side': spherical = { theta: Math.PI/2, phi: Math.PI/2-0.01, radius: dist }; break;
    case 'top': spherical = { theta: 0, phi: 0.01, radius: dist }; break;
  }
  updateCameraFromSpherical();
}

// ═══════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

drawContainer();
animate();
</script>
