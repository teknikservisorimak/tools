<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORİMAK — Araç Merkezi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a0a0a;font-family:system-ui,sans-serif}

.bar{
  height:46px;background:#111;border-bottom:2px solid #F7A800;
  display:flex;align-items:center;padding:0 18px;gap:12px;
  position:relative;z-index:100;
}
.logo{
  width:30px;height:30px;background:#F7A800;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#111;
}
.title{font-size:13px;font-weight:700;color:#eee;white-space:nowrap}
.title b{color:#F7A800}

.sw{
  margin-left:auto;display:flex;background:#000;
  border:1px solid #333;border-radius:9px;padding:3px;position:relative;
}
.sb{
  position:relative;z-index:2;padding:7px 18px;
  font-size:12px;font-weight:700;color:#555;
  background:none;border:none;border-radius:7px;
  cursor:pointer;transition:color .2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;font-family:inherit;
}
.sb:hover{color:#999}
.sb.on{color:#111}
.sld{
  position:absolute;top:3px;left:3px;height:calc(100% - 6px);
  border-radius:7px;background:#F7A800;z-index:1;
  transition:transform .3s ease,width .3s ease;
  box-shadow:0 2px 8px rgba(247,168,0,.3);
}
.dt{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d0{background:#3b82f6}
.d1{background:#22c55e}
.kh{font-size:9px;color:#444;margin-left:6px}
.kh kbd{background:#1a1a1a;border:1px solid #333;border-radius:3px;padding:1px 4px;font-size:9px;color:#777}

.frames{position:relative;width:100%;height:calc(100vh - 48px)}
.frames iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;
}
.frames iframe.hide{
  visibility:hidden;pointer-events:none;
}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">O</div>
  <div class="title"><b>ORİMAK</b>&ensp;Araç Merkezi</div>
  <div class="sw" id="sw">
    <div class="sld" id="sld"></div>
    <button class="sb on" id="b0" onclick="go(0)"><span class="dt d0"></span>CUDBOX Üretici</button>
    <button class="sb" id="b1" onclick="go(1)"><span class="dt d1"></span>FEFCO Hesaplama</button>
  </div>
  <span class="kh"><kbd>1</kbd>/<kbd>2</kbd></span>
</div>

<div class="frames">
  <iframe id="f0" src="cudbox.html"></iframe>
  <iframe id="f1" src="fefco.html" class="hide"></iframe>
</div>

<script>
var cur=0;
function go(i){
  if(i===cur)return;
  cur=i;
  document.getElementById('f0').className=i===0?'':'hide';
  document.getElementById('f1').className=i===1?'':'hide';
  document.getElementById('b0').className=i===0?'sb on':'sb';
  document.getElementById('b1').className=i===1?'sb on':'sb';
  ms();
}
function ms(){
  var s=document.getElementById('sld');
  var b=document.getElementById('b'+cur);
  var w=document.getElementById('sw');
  var wr=w.getBoundingClientRect();
  var br=b.getBoundingClientRect();
  s.style.width=br.width+'px';
  s.style.transform='translateX('+(br.left-wr.left-3)+'px)';
}
document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA'||t==='SELECT')return;
  if(e.key==='1')go(0);
  if(e.key==='2')go(1);
});
window.onload=function(){setTimeout(ms,80)};
window.onresize=ms;
</script>
</body>
</html>
